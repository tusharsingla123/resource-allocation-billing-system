{% extends 'base.html' %}
{% block title %}Edit Allotment Rate{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="p-4 shadow bg-white rounded" style="width: 400px;">
        <h2>Edit Allotment Rate</h2>
        <form method="POST" style="width: 50%;">
                <label>Kacha Rate:</label>
                <input type="number" step="0.000001" name="kacha_rate" value="{{ rate.kacha_rate }}" required class="form-control" required><br>
            <label>Platform Rate:</label>
                <input type="number" step="0.000001" name="paka_rate" value="{{ rate.paka_rate }}"  required class="form-control" required><br>
                <label>Kacha Penalty:</label>
                <input type="number" step="0.000001" name="kacha_penalty" value="{{ rate.kacha_penalty }}"  required class="form-control" required><br>
            <label>Platform Penalty:</label>
            <input type="number" step="0.000001" name="paka_penalty" value="{{ rate.paka_penalty }}"  required class="form-control" required><br>
                <label>With Effect From: </label>
                <input type="date" name="from_date" required class="form-control"><br>
            <button type="submit" class="updatebtn">Update</button>
        </form>
    </div>
</div>
<style>
    
.updatebtn
    {
        text-align: center;
        background-color: #21BF21;
        color: white;
        text-decoration: none;
        padding: 5px;
        padding-left: 10px;
        padding-right: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); 
        border: none;
    }
    .updatebtn:hover
    {
    background-color:#52FA52;
    color: black;
    text-decoration: none;
    }
</style>
{% endblock %}
